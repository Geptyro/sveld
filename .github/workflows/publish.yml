name: Publish to VS Code Marketplace

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
          - win32-x64
          - win32-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install esbuild for target platform
        run: |
          rm -rf node_modules/@esbuild
          npm install @esbuild/${{ matrix.target }}

      - name: Publish
        run: npx vsce publish --target ${{ matrix.target }} -p ${{ secrets.VSCE_PAT }}
