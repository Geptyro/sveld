<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="18" fill="#1e2334"/>

  <!-- Left: code lines -->
  <rect x="14" y="30" width="42" height="4.5" rx="2.25" fill="#4ecdc4" opacity="0.55"/>
  <rect x="14" y="41" width="30" height="4.5" rx="2.25" fill="#4ecdc4" opacity="0.35"/>
  <rect x="14" y="52" width="38" height="4.5" rx="2.25" fill="#4ecdc4" opacity="0.45"/>
  <rect x="14" y="63" width="24" height="4.5" rx="2.25" fill="#4ecdc4" opacity="0.28"/>
  <rect x="14" y="74" width="36" height="4.5" rx="2.25" fill="#4ecdc4" opacity="0.38"/>
  <rect x="14" y="85" width="28" height="4.5" rx="2.25" fill="#4ecdc4" opacity="0.45"/>
  <rect x="14" y="96" width="34" height="4.5" rx="2.25" fill="#4ecdc4" opacity="0.3"/>

  <!-- Divider -->
  <line x1="64" y1="18" x2="64" y2="110" stroke="#4ecdc4" stroke-width="0.75" opacity="0.18"/>

  <!-- Arrow -->
  <g opacity="0.9">
    <line x1="68" y1="64" x2="76" y2="64" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round"/>
    <polyline points="73,60 77,64 73,68" fill="none" stroke="#4ecdc4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right: rendered card -->
  <rect x="82" y="24" width="34" height="80" rx="6" fill="#252d42"/>
  <!-- card header accent -->
  <rect x="82" y="24" width="34" height="7" rx="6" fill="#4ecdc4" opacity="0.15"/>
  <rect x="82" y="28" width="34" height="3" fill="#4ecdc4" opacity="0.15"/>
  <!-- title line -->
  <rect x="88" y="38" width="22" height="4" rx="2" fill="#4ecdc4" opacity="0.85"/>
  <!-- content lines -->
  <rect x="88" y="48" width="18" height="3" rx="1.5" fill="#e8eaf0" opacity="0.25"/>
  <rect x="88" y="55" width="20" height="3" rx="1.5" fill="#e8eaf0" opacity="0.18"/>
  <rect x="88" y="62" width="14" height="3" rx="1.5" fill="#e8eaf0" opacity="0.22"/>
  <!-- button -->
  <rect x="88" y="72" width="22" height="8" rx="3" fill="#4ecdc4" opacity="0.22"/>
  <rect x="88" y="72" width="22" height="8" rx="3" stroke="#4ecdc4" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- bottom lines -->
  <rect x="88" y="87" width="16" height="3" rx="1.5" fill="#e8eaf0" opacity="0.15"/>
  <rect x="88" y="94" width="20" height="3" rx="1.5" fill="#e8eaf0" opacity="0.12"/>
</svg>
